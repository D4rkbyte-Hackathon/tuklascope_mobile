name: Deploy Backend to Hugging Face Spaces

on:
    push:
        branches:
            - main # Or whichever branch you want to trigger the deployment
        paths:
            - "backend/**" # Only deploy when changes are made to the backend folder
            - ".github/workflows/deploy_hf.yml"

jobs:
    deploy:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout GitHub Repository
              uses: actions/checkout@v4

            - name: Clone Hugging Face Space and Push Updates
              env:
                  HF_TOKEN: ${{ secrets.HF_TOKEN }}
                  HF_USERNAME: "D4rkbyte" # e.g., d4rkbyte
                  HF_SPACE_NAME: "tuklascope-api" # e.g., tuklascope-api
              run: |
                  # 1. Configure Git for the bot
                  git config --global user.email "github-actions[bot]@users.noreply.github.com"
                  git config --global user.name "github-actions[bot]"

                  # 2. Clone the Hugging Face Space into a temporary directory
                  git clone https://$HF_USERNAME:$HF_TOKEN@huggingface.co/spaces/$HF_USERNAME/$HF_SPACE_NAME hf_space

                  # 3. Clean the old files in the HF space (excluding the .git folder and README.md)
                  find hf_space -mindepth 1 -not -name '.git' -not -name 'README.md' -delete

                  # 4. Copy the entire contents of the backend folder into the HF space root
                  cp -r backend/* hf_space/

                  # 5. Commit and push the changes to Hugging Face
                  cd hf_space
                  git add .

                  # Only commit and push if there are actual changes
                  if git diff --staged --quiet; then
                    echo "No changes to deploy."
                  else
                    git commit -m "Auto-deploy backend from GitHub Actions"
                    git push origin main
                  fi
