name: Deploy Backend to Hugging Face Spaces

on:
    push:
        branches:
            - main
        paths:
            - "backend/**"
            - ".github/workflows/deploy_hf.yml"

jobs:
    deploy:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout GitHub Repository
              uses: actions/checkout@v4

            - name: Clone Hugging Face Space and Push Updates
              env:
                  HF_TOKEN: ${{ secrets.HF_TOKEN }}
                  HF_USERNAME: "D4rkbyte"
                  HF_SPACE_NAME: "tuklascope-api"
              run: |
                  # 1. Configure Git for the bot
                  git config --global user.email "github-actions[bot]@users.noreply.github.com"
                  git config --global user.name "github-actions[bot]"

                  # 2. Clone the Hugging Face Space
                  git clone https://$HF_USERNAME:$HF_TOKEN@huggingface.co/spaces/$HF_USERNAME/$HF_SPACE_NAME hf_space

                  # 3. Enter the directory FIRST
                  cd hf_space

                  # 4. Safely delete old files EXCEPT .git and README.md
                  find . -maxdepth 1 ! -name '.' ! -name '.git' ! -name 'README.md' -exec rm -rf {} +

                  # 5. Copy the backend files from the parent directory
                  cp -r ../backend/* ./

                  # 6. Commit and push directly to Hugging Face
                  git add .

                  if git diff --staged --quiet; then
                    echo "No changes to deploy."
                  else
                    git commit -m "Auto-deploy backend from GitHub Actions"
                    git push origin main
                  fi
